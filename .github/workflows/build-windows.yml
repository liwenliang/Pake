name: Build Windows

on:
  push:
    branches: [ experimental ]
  pull_request:
    branches: [ experimental ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install WiX Toolset
        run: |
          New-Item -ItemType Directory -Force -Path "C:\Users\runneradmin\AppData\Local\tauri\WixTools314"
          Invoke-WebRequest "https://github.com/wixtoolset/wix3/releases/download/wix3112rtm/wix311-binaries.zip" -OutFile "wix-binaries.zip"
          Expand-Archive -Path "wix-binaries.zip" -DestinationPath "C:\Users\runneradmin\AppData\Local\tauri\WixTools314"
          Get-ChildItem "C:\Users\runneradmin\AppData\Local\tauri\WixTools314"

      - name: Verify WiX installation
        run: |
          candle.exe -?
          light.exe -?

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-app
          path: src-tauri/target/release/*.exe
