name: Build Windows

on:
  push:
    branches: [ experimental ]
  pull_request:
    branches: [ experimental ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install WiX Toolset
        run: |
          New-Item -ItemType Directory -Force -Path "$env:RUNNER_TEMP\wix"
          Invoke-WebRequest "https://github.com/wixtoolset/wix3/releases/download/wix3112rtm/wix311-binaries.zip" -OutFile "$env:RUNNER_TEMP\wix\wix-binaries.zip"
          Expand-Archive -Path "$env:RUNNER_TEMP\wix\wix-binaries.zip" -DestinationPath "$env:RUNNER_TEMP\wix\binaries"
          echo "$env:RUNNER_TEMP\wix\binaries" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build
        env:
          WIX: ${{ runner.temp }}\wix\binaries

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-app
          path: src-tauri/target/release/*.exe
